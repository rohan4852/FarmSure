<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmSure - Marketplace</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header>
        <div class="logo">FarmSure - Marketplace</div>
        <nav class="navbar">
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="about.html" id="About">About us</a></li>
                <li id="userNav"></li>
                <li>
                    <select id="languageSelect">
                        <option value="en">English</option>
                        <option value="hi">हिन्दी</option>
                    </select>
                </li>
                <li id="authButtons">
                    <a href="#login" id="loginBtn">Login</a>
                    <a href="#signup" id="signupBtn">Signup</a>
                </li>
            </ul>
        </nav>
    </header>
    <!-- user info -->
    <div id="user-info" style="display: none;">
        <span id="username"></span>
        <button id="logout-button">Logout</button>
    </div>
    <main>
        <section id="marketplace">
            <h2 data-translate="marketplaceTitle">Available Contracts</h2>
            <p data-translate="marketplaceDescription">Browse through our available contracts and find the best options
                for your
                farming needs.</p>
            <div id="contracts-container">
                <section>
                    <div id="contracts-container">
                </section>
                <section id="login" class="modal">
                    <div class="modal-content">
                        <span class="close">&times;</span>
                        <h2>Login</h2>
                        <form>
                            <label for="loginEmail">Email:</label>
                            <input type="email" id="loginEmail" required>
                            <label for="role">Role:</label>
                            <input type="text" id="role" required>
                            <label for="loginPassword">Password:</label>
                            <input type="password" id="loginPassword" required>
                            <button type="submit">Login</button>
                        </form>
                    </div>
                </section>
                <section id="add-contract" class="modal">
                    <div class="modal-content">
                        <span class="close">&times;</span>
                        <h2>Add Contract</h2>
                        <form id="addContractForm">
                            <label for="contractTitle">Contract Title:</label>
                            <input type="text" id="contractTitle" name="contractTitle" required>
                            <label for="contractDescription">Description:</label>
                            <textarea id="contractDescription" name="contractDescription" required></textarea>
                            <label for="contractDuration">Duration:</label>
                            <input type="text" id="contractDuration" name="contractDuration" required>
                            <label for="contractCrops">Crops:</label>
                            <input type="text" id="contractCrops" name="contractCrops" required>
                            <label for="contractFarmingMethod">Farming Method:</label>
                            <input type="text" id="contractFarmingMethod" name="contractFarmingMethod" required>
                            <label for="contractBuyer">Buyer:</label>
                            <input type="text" id="contractBuyer" name="contractBuyer" required>
                            <label for="contractPrice">Price:</label>
                            <input type="number" id="contractPrice" name="contractPrice" required step="0.01">
                            <label for="contractQuantity">Quantity:</label>
                            <input type="text" id="contractQuantity" name="contractQuantity" required>
                            <label for="contractQualityStandards">Quality Standards:</label>
                            <textarea id="contractQualityStand ards" name="contractQualityStandards"
                                required></textarea>
                            <label for="contractDeliveryTimeline">Delivery Timeline:</label>
                            <input type="text" id="contractDeliveryTimeline" name="contractDeliveryTimeline" required>
                            <label for="contractAdditionalTerms">Additional Terms:</label>
                            <textarea id="contractAdditionalTerms" name="contractAdditionalTerms"></textarea>
                            <label for="contractPostedDate">Posted Date:</label>
                            <input type="date" id="contractPostedDate" name="contractPostedDate" required>
                            <label for="contractExpiryDate">Expiry Date:</label>
                            <input type="date" id="contractExpiryDate" name="contractExpiryDate" required>
                            <button type="submit">Submit Contract</button>
                        </form>
                    </div>
                </section>
                <section id="signup" class="modal">
                    <div class="modal-content">
                        <span class="close">&times;</span>
                        <h2>Signup</h2>
                        <form>
                            <label for="signupUsername">Username:</label>
                            <input type="text" id="username" required>
                            <label for="signupName">Full Name:</label>
                            <input type="text" id="FullName" required>
                            <label for="signupEmail">Email:</label>
                            <input type="email" ```html id="email" required>
                            <label for="signupPassword">Password:</label>
                            <input type="password" id="signupPassword" required>
                            <label for="role">Role:</label>
                            <input type="text" id="signuprole" required>
                            <button type="submit">Signup</button>
                        </form>
                    </div>
                </section>
                <section id="contract-details" class="modal">
                    <div class="modal-content">
                        <span class="close">&times;</span>
                        <h2>Contract Details</h2>
                        <div id="contract-details-content"></div>
                    </div>
                </section>
                <!-- Modal for displaying contract details -->
                <div id="contractDetailsModal" class="modal" style="display:none;">
                    <div class="modal-content">
                        <span class="close">&times;</span>
                        <h2 class="modal-title"></h2>
                        <p class="modal-description"></p>
                        <p class="modal-duration"></p>
                        <p class="modal-crops"></p>
                        <p class="modal-farming-method"></p>
                        <p class="modal-buyer"></p>
                        <p class="modal-price"></p>
                        <p class="modal-quantity"></p>
                        <p class="modal-quality-standards"></p>
                        <p class="modal-delivery-timeline"></p>
                        <p class="modal-additional-terms"></p>
                        <p class="modal-posted-date"></p>
                        <p class="modal-expiry-date"></p>
                    </div>
                </div>
    </main>
    <footer>
        <p>&copy; 2024 Contract Farming System. All rights reserved.</p>
    </footer>
    <script src="js/marketplace.js"></script>
    <script src="js/language.js"></script>
</body>

</html>
