<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmSure - Marketplace</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header>
        <div class="logo">FarmSure - Marketplace</div>
        <nav class="navbar">
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="about.html" id="About">About us</a></li>
                <li><a href="#login" id="loginBtn">Login</a></li>
                <li><a href="#signup" id="signupBtn">Signup</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h2>Available Contracts</h2>
            <div id="contracts-container">
                <section>
                    <div id="contracts-container">
                </section>
                <section id="login" class="modal">
                    <div class="modal-content">
                        <span class="close">&times;</span>
                        <h2>Login</h2>
                        <form>
                            <label for="loginEmail">Email:</label>
                            <input type="email" id="loginEmail" required>
                            <label for="role">Role:</label>
                            <input type="text" id="role" required>
                            <label for="loginPassword">Password:</label>
                            <input type="password" id="loginPassword" required>
                            <button type="submit">Login</button>
                        </form>
                    </div>
                </section>

                <section id="signup" class="modal">
                    <div class="modal-content">
                        <span class="close">&times;</span>
                        <h2>Signup</h2>
                        <form>
                            <label for="signupUsername">Username:</label>
                            <input type="text" id="username" required>
                            <label for="signupName">Full Name:</label>
                            <input type="text" id="FullName" required>
                            <label for="signupEmail">Email:</label>
                            <input type="email" ```html id="email" required>
                            <label for="signupPassword">Password:</label>
                            <input type="password" id="signupPassword" required>
                            <label for="role">Role:</label>
                            <input type="text" id="signuprole" required>
                            <button type="submit">Signup</button>
                        </form>
                    </div>
                </section>
                <section id="contract-details" class="modal">
                    <div class="modal-content">
                        <span class="close">&times;</span>
                        <h2>Contract Details</h2>
                        <div id="contract-details-content"></div>
                    </div>
                </section>
    </main>
    <footer>
        <p>&copy; 2024 Contract Farming System. All rights reserved.</p>
    </footer>
    <script src="js/marketplace.js"></script>
</body>

</html>
