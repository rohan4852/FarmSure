<%@ page contentType="text/html;charset=UTF-8" language="java" %>
    <!DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Error</title>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script>
            document.addEventListener('DOMContentLoaded', function () {
                var errorMsg = '${errorMsg}'; // Get the error message dynamically
                if (errorMsg) { // Only show the popup if an error message exists
                    Swal.fire({
                        icon: 'error',
                        title: 'Oops...',
                        text: errorMsg, // Display the dynamic error message
                        footer: '<a href="#">Why do I have this issue?</a>',
                        confirmButtonText: 'OK'
                    }).then((result) => {
                        if (result.isConfirmed) {
                            // When the user clicks "OK", go back to the previous page in history
                            window.history.back();
                        }
                    });
                }
            });
        </script>
    </head>

    <body>
    </body>

    </html>
